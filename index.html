<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>🏆 Oscar Reborn AU</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:30px;
border-bottom:3px solid gold;
}

h1{
color:gold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
width:260px;
}

select{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
color:white;
border:none;
}

button{
background:gold;
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
width:100%;
}

#ranking{
margin-top:40px;
font-size:18px;
}

</style>
</head>

<body>

<header>
<h1>🏆 OSCAR REBORN AU 🏆</h1>
</header>

<div class="container">

<div class="card">

<h2>Melhor Personagem</h2>

<select id="personagem">

<option>Alder Florence</option>
<option>Dante Montclair</option>
<option>Tyler Stellarium</option>
<option>Vexy Montclair</option>

</select>

<button onclick="votar()">Votar</button>

</div>

</div>

<h2>👑 Ranking</h2>

<div id="ranking">Carregando votos...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyA16KL1HCJOype61vCoBJxjCJfJADh7H-A",

authDomain: "oscar-votacao.firebaseapp.com",

databaseURL: "https://oscar-votacao-default-rtdb.firebaseio.com",

projectId: "oscar-votacao",

storageBucket: "oscar-votacao.firebasestorage.app",

messagingSenderId: "954222088315",

appId: "1:954222088315:web:7591cc8184e7da0cf1d2de",

measurementId: "G-XHMKH5B7L6"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.votar = function(){

let nome = document.getElementById("personagem").value;

push(ref(db,"votos"),{

nome:nome

});

alert("Voto enviado!");

};

const votosRef = ref(db,"votos");

onValue(votosRef,(snapshot)=>{

let dados = snapshot.val();

let contagem = {};

for(let id in dados){

let n = dados[id].nome;

contagem[n] = (contagem[n] || 0) + 1;

}

let ranking = Object.entries(contagem)
.sort((a,b)=>b[1]-a[1]);

let html="";

ranking.forEach(r=>{

html += r[0] + " — " + r[1] + " votos<br>";

});

document.getElementById("ranking").innerHTML = html;

});

</script>

</body>
</html>
