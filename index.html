<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 OSCAR REBORN AU 🏆</title>
<style>
  /* Reset básico */
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Georgia', serif; }
  body { background: linear-gradient(180deg, #0a0a0a, #1a1a1a); color:#fff; }
  header { text-align:center; padding:2rem; background:#111; box-shadow:0 5px 15px rgba(0,0,0,0.7);}
  header h1 { font-size:3rem; color:#FFD700; text-shadow: 2px 2px 10px #000; }

  .container { display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; padding:2rem; }

  .card { background:#1c1c1c; padding:1.5rem; border-radius:15px; box-shadow: 0 5px 25px rgba(0,0,0,0.7); transition: transform 0.3s, box-shadow 0.3s; }
  .card:hover { transform: translateY(-5px); box-shadow:0 10px 35px rgba(255,215,0,0.5); }
  .card h3 { margin-bottom:0.5rem; color:#FFD700; }
  .desc { font-size:0.9rem; margin-bottom:1rem; color:#ccc; }

  select { width:100%; padding:0.5rem; border-radius:8px; border:none; margin-bottom:0.8rem; background:#333; color:#fff; }
  button { width:100%; padding:0.7rem; border:none; border-radius:8px; background:#FFD700; color:#111; font-weight:bold; cursor:pointer; transition:0.3s; }
  button:hover { background:#e6c200; }

  .admin { background:#111; padding:1.5rem; border-radius:15px; margin:2rem; text-align:center; }
  .admin input { padding:0.5rem; border-radius:8px; border:none; width:60%; margin-bottom:1rem; }

  #painel { display:none; background:#1c1c1c; padding:1.5rem; border-radius:15px; margin:2rem; box-shadow:0 5px 25px rgba(0,0,0,0.7); }
  #painel h2 { color:#FFD700; margin-bottom:1rem; }
  #resultados h3 { color:#ffcc00; margin-top:1rem; }
  #resultados div { margin-left:1rem; margin-bottom:0.3rem; }
</style>
</head>
<body>

<header>
<h1>🏆 OSCAR REBORN AU 🏆</h1>
</header>

<div class="container">
<script>
const personagens = [
"Alder Florence","Arkan Chloropterus Good Zephir","Clarice Franchesca de Mordred",
"Dante Montclair","Dimitri Diometris","Gal-Sal","Henri Juan","Jason Gewitter",
"Jorenina \"Fritz\" Electro","Jota Dantas","July Suertes","Lúcio Davo",
"Luna","Sierra Woods","Tyler Stellarium","Vexy Montclair",
"Aline (Coelho Rosa)","C!Áster","Coelho Dourado","Mike (Lobo Dourado)","Sarah Good"
];

const categorias = [
{nome:"Melhor Personagem", emoji:"⭐", desc:"Personagem mais marcante e importante da história.", opcoes:personagens.slice(0,16)},
{nome:"Alívio Cômico", emoji:"😂", desc:"Personagem responsável pelos momentos mais engraçados da história.", opcoes:personagens.slice(0,16)},
{nome:"Mais Misterioso", emoji:"🕵️", desc:"Personagem ou vilão com passado mais enigmático.", opcoes:personagens},
{nome:"Melhor Vilão", emoji:"😈", desc:"Antagonista mais impactante da história.", opcoes:personagens.slice(16)},
{nome:"Melhor Performance Dramática", emoji:"🎭", desc:"Atuação mais intensa e emocional.", opcoes:personagens.slice(0,16)},
{nome:"Personagem Mais Carismático", emoji:"💖", desc:"Personagem que conquistou todos com sua presença e charme.", opcoes:personagens.slice(0,16)},
{nome:"Personagem Mais Heroico", emoji:"⚡", desc:"Personagem que realizou os atos mais corajosos e inspiradores.", opcoes:personagens.slice(0,16)},
{nome:"Personagem Mais Estratégico", emoji:"🧩", desc:"Personagem que se destacou pela inteligência e planos engenhosos.", opcoes:personagens.slice(0,16)},
{nome:"Revelação do Ano", emoji:"🌟", desc:"Personagem que mais surpreendeu os espectadores.", opcoes:personagens.slice(0,16)},
{nome:"Melhor Romance", emoji:"💌", desc:"Dupla ou casal com química mais marcante.", opcoes:[
"Alder x Dimitri","Arkan x Vexy","Gal-sal x Vexy","Henri x Dante","Henry x Henri",
"Alder x Russel","Dimitri x July","Coelho Dourado x Efeitos especiais","Jason x Jota"
]},
{nome:"Melhor Amigo", emoji:"🤝", desc:"Personagem mais leal e confiável.", opcoes:personagens.slice(0,16)},
{nome:"Vilão Mais Inteligente", emoji:"🧠", desc:"Antagonista que se destacou pelo planejamento e astúcia.", opcoes:personagens.slice(16)},
{nome:"Vilão Mais Cruel", emoji:"💀", desc:"Antagonista que causou mais sofrimento.", opcoes:personagens.slice(16)},
{nome:"Crossover Mais Interessante", emoji:"🔗", desc:"Personagem que teve melhor interação com outros universos/personagens.", opcoes:personagens.slice(0,16)},
{nome:"Melhor Cena", emoji:"🎬", desc:"Cena ou momento mais marcante da história.", opcoes:[
"Morte de Sierra","Alder matando monstro gigante","Primeira cena de Aline",
"Morte de Jason","Morte de Alder","C!Áster no laboratório","Morte de Gal-sal",
"E se voltarem.... anos depois.."
]}
];

categorias.forEach((cat,i)=>{
  document.write(`
  <div class="card">
    <h3>${cat.emoji} ${cat.nome}</h3>
    <div class="desc">${cat.desc}</div>
    <select id="cat${i+1}">
      ${cat.opcoes.map(p=>`<option>${p}</option>`).join("")}
    </select>
    <button onclick="votar('cat${i+1}','${cat.nome}')">Votar</button>
  </div>
  `);
});
</script>
</div>

<!-- PAINEL ADMIN -->
<div class="admin">
  <h3>🔐 Painel do Administrador</h3>
  <input type="password" id="senha" placeholder="Senha"><br><br>
  <button onclick="abrirPainel()">Abrir Painel</button>
</div>

<div id="painel" style="display:none;">
  <h2>📊 Resultados</h2>
  <div id="resultados"></div>
  <button id="resetBtn" onclick="resetar()" style="display:none; margin-top:1rem; background:#ff4d4d; color:#111;">🗑️ Resetar Votos</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyBwArCoZgIUuxkmfn_3L2Up4GDW1-5UOkc",
  authDomain:"oscar-votacao-b114a.firebaseapp.com",
  databaseURL:"https://oscar-votacao-b114a-default-rtdb.firebaseio.com",
  projectId:"oscar-votacao-b114a",
  storageBucket:"oscar-votacao-b114a.appspot.com",
  messagingSenderId:"452345552218",
  appId:"1:452345552218:web:6dd321cd5a6e4bcf91e763"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.votar = (selectId,categoriaFirebase)=>{
  if(localStorage.getItem("votou_"+selectId)){
    alert("Você já votou nessa categoria.");
    return;
  }
  let valor=document.getElementById(selectId).value;
  push(ref(db,"votos/"+categoriaFirebase),{nome:valor});
  localStorage.setItem("votou_"+selectId,true);
  alert("Voto enviado!");
}

window.abrirPainel=()=>{
  const senha = document.getElementById("senha").value;
  if(senha!="Araldo3004"){ alert("Senha incorreta"); return; }

  document.getElementById("painel").style.display="block";
  document.getElementById("resetBtn").style.display="inline-block";

  onValue(ref(db,"votos"),snapshot=>{
    let dados=snapshot.val(); 
    let html="";

    for(let cat in dados){
      let contagem={};
      let total=0;
      for(let id in dados[cat]){
        let nome=dados[cat][id].nome;
        contagem[nome]=(contagem[nome]||0)+1;
        total++;
      }

      let ranking=Object.entries(contagem).sort((a,b)=>b[1]-a[1]);
      html+=`<h3>${cat} (Total: ${total})</h3>`;
      
      ranking.forEach(r=>{
        let porcentagem = ((r[1]/total)*100).toFixed(1);
        html+=`<div>${r[0]} — ${r[1]} votos (${porcentagem}%)</div>`;
      });

      html+="<hr style='border:1px solid #555; margin:0.5rem 0;'>";
    }

    document.getElementById("resultados").innerHTML=html;
  });
}

window.resetar=()=>{
  const senha = document.getElementById("senha").value;
  if(senha!="Araldo3004"){ alert("Senha incorreta"); return; }

  if(!confirm("Tem certeza que deseja apagar todos os votos?")) return;

  remove(ref(db,"votos")).then(()=>{
    alert("Votos apagados");
    document.getElementById("resultados").innerHTML="";
  });
}
</script>
</body>
</html>
