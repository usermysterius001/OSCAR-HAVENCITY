<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>🏆 Oscar Reborn AU</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:30px;
border-bottom:3px solid gold;
}

h1{
color:gold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
width:260px;
}

select{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
color:white;
border:none;
}

button{
background:gold;
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
width:100%;
}

#ranking{
margin-top:30px;
font-size:18px;
display:none;
}

.admin{
margin-top:40px;
}

input{
padding:10px;
background:#222;
border:none;
color:white;
}

</style>
</head>

<body>

<header>
<h1>🏆 OSCAR REBORN AU 🏆</h1>
</header>

<div class="container">

<div class="card">

<h2>Melhor Personagem</h2>

<select id="personagem">

<option>Alder Florence</option>
<option>Dante Montclair</option>
<option>Tyler Stellarium</option>
<option>Vexy Montclair</option>

</select>

<button onclick="votar()">Votar</button>

</div>

</div>

<div class="admin">

<h3>🔐 Área do Administrador</h3>

<input type="password" id="senhaAdmin" placeholder="Digite a senha">

<button onclick="verResultados()">Ver resultados</button>

</div>

<h2 id="tituloRanking" style="display:none;">👑 Resultados</h2>

<div id="ranking"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBwArCoZgIUuxkmfn_3L2Up4GDW1-5UOkc",
authDomain: "oscar-votacao-b114a.firebaseapp.com",
databaseURL: "https://oscar-votacao-b114a-default-rtdb.firebaseio.com",
projectId: "oscar-votacao-b114a",
storageBucket: "oscar-votacao-b114a.firebasestorage.app",
messagingSenderId: "452345552218",
appId: "1:452345552218:web:6dd321cd5a6e4bcf91e763"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.votar = function(){

let nome = document.getElementById("personagem").value;

push(ref(db,"votos"),{
nome:nome
});

alert("Voto enviado!");

};

window.verResultados = function(){

let senha = document.getElementById("senhaAdmin").value;

if(senha !== "30042012"){
alert("Senha incorreta");
return;
}

document.getElementById("ranking").style.display="block";
document.getElementById("tituloRanking").style.display="block";

onValue(ref(db,"votos"),(snapshot)=>{

let dados = snapshot.val();

let contagem = {};

for(let id in dados){

let n = dados[id].nome;

contagem[n] = (contagem[n] || 0) + 1;

}

let ranking = Object.entries(contagem)
.sort((a,b)=>b[1]-a[1]);

let html="";

ranking.forEach(r=>{

html += r[0] + " — " + r[1] + " votos<br>";

});

document.getElementById("ranking").innerHTML = html;

});

}

</script>

</body>
</html>
